<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Tonal Theory</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- MUSIC THEORY CONSTANTS ---
        const PITCHES = [
          { name: 'C', freq: 261.63, index: 0, sig: '0' },
          { name: 'G', freq: 392.00, index: 1, sig: '1#' },
          { name: 'D', freq: 293.66, index: 2, sig: '2#' },
          { name: 'A', freq: 440.00, index: 3, sig: '3#' },
          { name: 'E', freq: 329.63, index: 4, sig: '4#' },
          { name: 'B/Cb', freq: 493.88, index: 5, sig: '5# / 7b' },
          { name: 'F#/Gb', freq: 369.99, index: 6, sig: '6# / 6b' },
          { name: 'Db/C#', freq: 277.18, index: 7, sig: '5b / 7#' },
          { name: 'Ab', freq: 415.30, index: 8, sig: '4b' },
          { name: 'Eb', freq: 311.13, index: 9, sig: '3b' },
          { name: 'Bb', freq: 466.16, index: 10, sig: '2b' },
          { name: 'F', freq: 349.23, index: 11, sig: '1b' }
        ];

        // Map Circle index to true Pitch Class (0=C, 1=Db/C#... 11=B)
        const PITCH_CLASSES = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];

        // Map Circle index to SVG Treble Staff Y-Coordinates
        const STAFF_MAP = {
            0:  { y: 95, acc: null, ledger: true }, // C4
            1:  { y: 65, acc: null }, // G4
            2:  { y: 87.5, acc: null }, // D4
            3:  { y: 57.5, acc: null }, // A4
            4:  { y: 80, acc: null }, // E4
            5:  { y: 50, acc: null }, // B4
            6:  { y: 72.5, acc: '#' },  // F#4
            7:  { y: 87.5, acc: 'b' },  // Db4
            8:  { y: 57.5, acc: 'b' },  // Ab4
            9:  { y: 80, acc: 'b' },  // Eb4
            10: { y: 50, acc: 'b' },  // Bb4
            11: { y: 72.5, acc: null }  // F4
        };

        const RADIUS = 140;
        const CENTER = 200;
        const PITCH_NODES = PITCHES.map((pitch, i) => {
          const angle = (i * 30 * Math.PI) / 180; 
          return {
            ...pitch,
            x: CENTER + RADIUS * Math.sin(angle),
            y: CENTER - RADIUS * Math.cos(angle),
          };
        });

        // --- AUDIO ENGINE ---
        let audioCtx = null;

        const playTone = (frequency, duration = 1.5) => {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          
          osc.type = 'triangle'; 
          osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
          
          gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
          gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05); 
          gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
          
          osc.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          
          osc.start();
          osc.stop(audioCtx.currentTime + duration);
        };

        const playChord = (indices) => {
          indices.forEach(index => {
            playTone(PITCHES[index].freq);
          });
        };

        // --- THE ULTIMATE CHORD SPELLER LOGIC ---
        const detectHarmony = (selectedIndices) => {
          const getHarmony = () => {
            if (selectedIndices.length === 0) return { title: "Empty Board", desc: "Select notes on the circle to build intervals and chords." };
            if (selectedIndices.length === 1) return { title: `Unison (${PITCHES[selectedIndices[0]].name.split('/')[0]})`, desc: "A single pure note. Select more to build a chord." };
            
            if (selectedIndices.length === 2) {
              let diff = Math.abs(selectedIndices[0] - selectedIndices[1]);
              if (diff > 6) diff = 12 - diff;
              const intervals = {
                1: { name: "Perfect 5th / Perfect 4th", desc: "1 step away. The most stable, consonant interval." },
                2: { name: "Major 2nd / Minor 7th", desc: "2 steps away. Creates a mild, jazzy tension." },
                3: { name: "Minor 3rd / Major 6th", desc: "3 steps away. The emotional building block of minor chords." },
                4: { name: "Major 3rd / Minor 6th", desc: "4 steps away. The bright building block of major chords." },
                5: { name: "Minor 2nd / Major 7th", desc: "5 steps away. High tension, sharp dissonance." },
                6: { name: "Tritone (Aug 4th / Dim 5th)", desc: "6 steps away. Exactly opposite on the circle. Maximum tension!" }
              };
              return { title: intervals[diff].name, desc: intervals[diff].desc };
            }

            // --- 3+ NOTES: EXACT CHORD SPELLER ---
            const semitones = selectedIndices.map(idx => PITCH_CLASSES[idx]);

            // This function mathematically spells a chord given a strict Root note
            const spellChord = (rootIdx, indicesArray) => {
                const rootPitch = PITCH_CLASSES[rootIdx];
                const rootName = PITCHES[rootIdx].name.split('/')[0];
                const intervals = indicesArray.map(idx => (PITCH_CLASSES[idx] - rootPitch + 12) % 12);
                const has = (i) => intervals.includes(i);
                
                const b2=has(1), M2=has(2), m3=has(3), M3=has(4), P4=has(5), d5=has(6), P5=has(7), m6=has(8), M6=has(9), m7=has(10), M7=has(11);
                
                let base = "", seventh = "", alts = [], omits = [];
                let isMaj = M3, isMin = m3 && !M3, isSus4 = P4 && !M3 && !m3, isSus2 = M2 && !M3 && !m3 && !P4;
                let isDim = isMin && d5 && !P5, isAug = M3 && m6 && !P5; 
                let no3 = !M3 && !m3 && !isSus4 && !isSus2;
                
                // 1. Determine Core Triad & 7th Quality
                if (isMaj && P5) { base = ""; }
                else if (isMin && P5) { base = "m"; }
                else if (isDim) { base = "dim"; }
                else if (isAug) { base = "aug"; }
                else if (isSus4 && P5) { base = "sus4"; }
                else if (isSus2 && P5) { base = "sus2"; }
                else if (P5 && no3) { base = "5"; }
                else if (isMaj && !P5) { base = ""; }
                else if (isMin && !P5) { base = "m"; }
                else { base = "(no3)"; }

                if (m7) {
                    if (base === "dim") seventh = "m7b5";
                    else if (base === "aug") seventh = "7#5";
                    else if (base === "") seventh = "7";
                    else if (base === "m") seventh = "m7";
                    else if (base === "sus4") seventh = "7sus4";
                    else if (base === "sus2") seventh = "7sus2";
                    else if (base === "5" || base === "(no3)") seventh = "7";
                } else if (M7) {
                    if (base === "aug") seventh = "maj7#5";
                    else if (base === "") seventh = "maj7";
                    else if (base === "m") seventh = "m(maj7)";
                    else if (base === "sus4") seventh = "maj7sus4";
                    else if (base === "5" || base === "(no3)") seventh = "maj7";
                } else if (M6 && base === "dim") {
                    seventh = "dim7";
                }

                let chordType = seventh || base;
                let isBase7 = seventh !== "";
                if (chordType === "(no3)") chordType = ""; 

                // 2. Handle Extensions (9, 11, 13)
                let highestExt = 0;
                if (isBase7) {
                    if (M2) highestExt = 9;
                    if (P4 && !isSus4) highestExt = 11;
                    if (M6 && base !== "dim" && base !== "aug") highestExt = 13;
                    
                    if (highestExt > 0) {
                        if (chordType.includes("maj7")) chordType = chordType.replace("maj7", "maj" + highestExt);
                        else if (chordType.includes("m7b5")) chordType = chordType.replace("m7b5", "m" + highestExt + "b5");
                        else if (chordType.includes("m7")) chordType = chordType.replace("m7", "m" + highestExt);
                        else if (chordType.includes("7sus4")) chordType = chordType.replace("7sus4", highestExt + "sus4");
                        else if (chordType.includes("7")) chordType = chordType.replace("7", highestExt);
                    }
                }
                
                // 3. Handle Additions
                if (!isBase7 && M6 && base !== "dim" && base !== "aug") {
                    if (M2) chordType = (base === "m") ? "m6/9" : "6/9";
                    else chordType = (base === "m") ? "m6" : "6";
                } else if (M6 && !isBase7 && base !== "dim" && base !== "aug") {
                    alts.push("add6");
                }

                if (M2 && highestExt < 9 && chordType !== "sus2" && !chordType.includes("6/9")) alts.push("add9");
                if (P4 && highestExt < 11 && chordType !== "sus4") alts.push("add11");

                // 4. Handle Alterations
                if (b2 && base !== "dim") alts.push("b9");
                if (m3 && isMaj) alts.push("#9");
                if (d5 && base !== "dim") {
                    if (isBase7 || P5 || isMaj) alts.push("#11");
                    else alts.push("b5");
                }
                if (m6 && base !== "aug") {
                    if (isBase7 || P5) alts.push("b13");
                    else alts.push("#5");
                }
                
                // 5. Handle Omissions
                if (!P5 && base !== "dim" && base !== "aug" && base !== "5" && !chordType.includes("b5")) omits.push("no5");
                if (no3 && base !== "5" && !chordType.includes("no3")) omits.push("no3");

                let name = rootName + chordType;
                if (alts.length > 0) name += `(${alts.join(',')})`;
                if (omits.length > 0) name += ` ${omits.join(' ')}`;
                
                // --- STRICT SCORING ALGORITHM ---
                let expected = [0];
                if (isMaj) expected.push(4);
                if (isMin) expected.push(3);
                if (P5 || base === "5") expected.push(7);
                if (base === "dim") expected.push(3, 6);
                if (base === "aug") expected.push(4, 8);
                if (chordType.includes("sus4")) expected.push(5);
                if (chordType.includes("sus2")) expected.push(2);
                if (m7) expected.push(10);
                if (M7) expected.push(11);
                if (chordType.includes("dim7") || chordType.includes("6")) expected.push(9);
                if (highestExt >= 9) expected.push(2);
                if (highestExt >= 11) expected.push(5);
                if (highestExt >= 13) expected.push(9);
                
                alts.forEach(a => {
                    if(a==="b9") expected.push(1);
                    if(a==="#9") expected.push(3);
                    if(a==="#11"||a==="b5") expected.push(6);
                    if(a==="b13"||a==="#5") expected.push(8);
                    if(a==="add9") expected.push(2);
                    if(a==="add11") expected.push(5);
                    if(a==="add6") expected.push(9);
                });

                let unaccounted = intervals.filter(i => !expected.includes(i));

                let score = 100;
                if (no3 && base !== "5") score -= 30; // Penalize lack of identity
                if (!P5 && base !== "dim" && base !== "aug") score -= 10;
                score -= unaccounted.length * 40; // Heavy penalty for missing notes
                score -= alts.length * 10;
                score -= omits.length * 5;

                if (isMaj || isMin) score += 15;
                if (isBase7) score += 10;

                return { name: name.trim(), score: score };
            };

            // ---- EVALUATE ALL COMBINATIONS ----
            let interpretations = [];

            // 1. Check all nodes as potential roots
            for (let i = 0; i < selectedIndices.length; i++) {
                interpretations.push(spellChord(selectedIndices[i], selectedIndices));
            }

            // 2. Check Slash Chords
            const triMaj = [0, 4, 7];
            const triMin = [0, 3, 7];
            
            for (let root = 0; root < 12; root++) {
                const rootPitch = root;
                const rName = PITCHES.find(p => PITCH_CLASSES[p.index] === root).name.split('/')[0];
                
                const checkSlash = (triadIntervals, suffix) => {
                    const triadPitches = triadIntervals.map(interval => (rootPitch + interval) % 12);
                    if (triadPitches.every(p => semitones.includes(p))) {
                        const leftovers = semitones.filter(p => !triadPitches.includes(p));
                        if (leftovers.length === 1) {
                            const bassName = PITCHES.find(p => PITCH_CLASSES[p.index] === leftovers[0]).name.split('/')[0];
                            interpretations.push({ name: `${rName}${suffix}/${bassName}`, score: 95 });
                        } else if (leftovers.length === 2) {
                            let diff = Math.abs(leftovers[0] - leftovers[1]);
                            if (diff === 7 || diff === 5) {
                                let p5root = (leftovers[1] - leftovers[0] === 7 || leftovers[0] - leftovers[1] === 5) ? leftovers[0] : leftovers[1];
                                const bassName = PITCHES.find(p => PITCH_CLASSES[p.index] === p5root).name.split('/')[0];
                                interpretations.push({ name: `${rName}${suffix}/${bassName}5`, score: 90 });
                            }
                        }
                    }
                };
                checkSlash(triMaj, "");
                checkSlash(triMin, "m");
            }

            // Sort and finalize alternative names
            interpretations.sort((a,b) => b.score - a.score);
            let uniqueNames = [];
            interpretations.forEach(item => {
                if (item.score > 20 && !uniqueNames.includes(item.name)) {
                    uniqueNames.push(item.name);
                }
            });

            if (uniqueNames.length === 0) {
                return { title: `${selectedIndices.length}-Note Cluster`, desc: "A highly dense, unconventional harmony." };
            }

            const topNames = uniqueNames.slice(0, 5);
            const primary = topNames[0];

            let desc = "A complex harmony.";
            if (primary.includes('/')) desc = "A Slash Chord. A simple triad played over a foreign bass note. Very common in advanced jazz and modern music.";
            else if (primary.includes('maj7') || primary.includes('maj9') || primary.includes('maj13')) desc = "A Major extension. Smooth, lush, and nostalgic.";
            else if (primary.includes('m7b5') || primary.includes('ø')) desc = "Half-Diminished. Moody and highly unstable. Often leads to a V chord.";
            else if (primary.includes('dim7')) desc = "Symmetrical tension used for dramatic transitions.";
            else if (primary.includes('m7') || primary.includes('m9') || primary.includes('m11')) desc = "A Minor extension. Cool, mellow, and jazzy.";
            else if (primary.includes('7') && !primary.includes('maj')) desc = "A Dominant extension. Funky, tense, and wants to resolve to a target.";
            else if (primary.includes('m') && !primary.includes('dim')) desc = "Darker, emotional, and complex.";
            else if (primary.includes('dim')) desc = "Highly unstable, spooky, wants to collapse.";
            else if (primary.includes('aug')) desc = "Dreamy, floaty, and unresolved.";
            else if (primary.includes('sus')) desc = "Open, airy, and creates a 'pull' waiting to resolve to a 3rd.";
            else if (!primary.includes('m') && !primary.includes('no3')) desc = "Bright, happy, and resolved.";
            else if (primary.includes('no3')) desc = "A highly altered cluster lacking a core 3rd.";

            return { 
                title: primary, 
                altNames: topNames.slice(1),
                desc: desc 
            };
          };

          const result = getHarmony();
          if (selectedIndices.length > 0) {
             result.spelling = selectedIndices.map(i => PITCHES[i].name.split('/')[0]).join(' - ');
          }
          return result;
        };

        // --- MAIN COMPONENT ---
        function App() {
          const [selectedNodes, setSelectedNodes] = useState([]);
          const [isPlaying, setIsPlaying] = useState(false);
          const [activeTab, setActiveTab] = useState('interactive'); 
          const [showSigs, setShowSigs] = useState(false);

          const harmonyInfo = detectHarmony(selectedNodes);

          const handleNodeClick = (index) => {
            let newSelection;
            if (selectedNodes.includes(index)) {
              newSelection = selectedNodes.filter(i => i !== index);
            } else {
              if (selectedNodes.length >= 8) {
                newSelection = [...selectedNodes.slice(1), index]; 
              } else {
                newSelection = [...selectedNodes, index];
              }
              playTone(PITCHES[index].freq);
            }
            setSelectedNodes(newSelection);
          };

          const playProgression = async (sequence) => {
            if (isPlaying) return;
            setIsPlaying(true);
            
            for (let i = 0; i < sequence.length; i++) {
              setSelectedNodes(sequence[i]);
              playChord(sequence[i]);
              await new Promise(r => setTimeout(r, 1400)); 
            }
            setIsPlaying(false);
          };

          const playModeScale = async (rootFreq, intervals) => {
            if (isPlaying) return;
            setIsPlaying(true);
            for (let i = 0; i < intervals.length; i++) {
              const freq = rootFreq * Math.pow(2, intervals[i] / 12);
              playTone(freq, 1.0);
              await new Promise(r => setTimeout(r, 400)); 
            }
            setIsPlaying(false);
          };

          // Generate SVG Staff Notes
          let staffNotes = selectedNodes.map(idx => ({ idx, ...STAFF_MAP[idx], x: 130 })).sort((a,b) => b.y - a.y);
          for(let i=0; i<staffNotes.length; i++) {
              if (i > 0 && Math.abs(staffNotes[i].y - staffNotes[i-1].y) <= 8 && staffNotes[i].x === staffNotes[i-1].x) {
                  staffNotes[i].x = staffNotes[i-1].x + 18;
                  for(let j=i+1; j<staffNotes.length; j++) staffNotes[j].x += 18;
              }
          }

          return (
            <div className="p-4 md:p-8 flex flex-col items-center">
              
              {/* Header & Tabs */}
              <div className="w-full max-w-5xl mb-8">
                <h1 className="text-3xl md:text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-indigo-400 mb-6 text-center">
                  Interactive Tonal Theory
                </h1>
                
                <div className="flex justify-center space-x-2 md:space-x-4 border-b border-slate-800 pb-2 flex-wrap gap-y-2">
                  <button 
                    onClick={() => setActiveTab('interactive')}
                    className={`px-4 py-2 rounded-t-lg font-semibold transition-colors ${activeTab === 'interactive' ? 'bg-slate-800 text-sky-400 border-b-2 border-sky-400' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-900'}`}
                  >
                    The Canvas (Speller)
                  </button>
                  <button 
                    onClick={() => setActiveTab('circle')}
                    className={`px-4 py-2 rounded-t-lg font-semibold transition-colors ${activeTab === 'circle' ? 'bg-slate-800 text-sky-400 border-b-2 border-sky-400' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-900'}`}
                  >
                    Decoding The Circle
                  </button>
                  <button 
                    onClick={() => setActiveTab('chords')}
                    className={`px-4 py-2 rounded-t-lg font-semibold transition-colors ${activeTab === 'chords' ? 'bg-slate-800 text-sky-400 border-b-2 border-sky-400' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-900'}`}
                  >
                    Chords & Intervals
                  </button>
                  <button 
                    onClick={() => setActiveTab('modes')}
                    className={`px-4 py-2 rounded-t-lg font-semibold transition-colors ${activeTab === 'modes' ? 'bg-slate-800 text-sky-400 border-b-2 border-sky-400' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-900'}`}
                  >
                    Modes & Scales
                  </button>
                </div>
              </div>

              {/* TAB CONTENT: INTERACTIVE CANVAS */}
              {activeTab === 'interactive' && (
                <div className="flex flex-col lg:flex-row gap-8 items-start w-full max-w-5xl justify-center">
                  
                  {/* LEFT: SVG CIRCLE & STAFF */}
                  <div className="flex-shrink-0 relative w-full max-w-[450px] bg-slate-900 rounded-3xl shadow-2xl p-6 border border-slate-800 mx-auto flex flex-col">
                    <div className="relative w-full aspect-square">
                      <svg viewBox="0 0 400 400" className="w-full h-full overflow-visible">
                        {/* Background Circle */}
                        <circle cx={CENTER} cy={CENTER} r={RADIUS} fill="none" stroke="#1e293b" strokeWidth="2" strokeDasharray="5,5" />

                        {/* Draw Interval Line */}
                        {selectedNodes.length === 2 && (
                          <line 
                            x1={PITCH_NODES[selectedNodes[0]].x} y1={PITCH_NODES[selectedNodes[0]].y}
                            x2={PITCH_NODES[selectedNodes[1]].x} y2={PITCH_NODES[selectedNodes[1]].y}
                            stroke="#38bdf8" strokeWidth="4" className="drop-shadow-[0_0_8px_rgba(56,189,248,0.8)] opacity-60"
                          />
                        )}

                        {/* Draw Triad Polygon */}
                        {selectedNodes.length >= 3 && (
                          <polygon 
                            points={[...selectedNodes].sort((a,b) => a-b).map(i => `${PITCH_NODES[i].x},${PITCH_NODES[i].y}`).join(' ')}
                            fill={
                              selectedNodes.length === 3 ? "rgba(56, 189, 248, 0.15)" : 
                              selectedNodes.length === 4 ? "rgba(167, 139, 250, 0.15)" :
                              selectedNodes.length >= 7 ? "rgba(234, 88, 12, 0.15)" :
                              "rgba(244, 114, 182, 0.15)"
                            }
                            stroke={
                              selectedNodes.length === 3 ? "#38bdf8" : 
                              selectedNodes.length === 4 ? "#a78bfa" : 
                              selectedNodes.length >= 7 ? "#f97316" :
                              "#f472b6"
                            } 
                            strokeWidth="3"
                            className={
                              selectedNodes.length === 3 ? "drop-shadow-[0_0_12px_rgba(56,189,248,0.4)]" : 
                              selectedNodes.length === 4 ? "drop-shadow-[0_0_12px_rgba(167,139,250,0.4)]" :
                              selectedNodes.length >= 7 ? "drop-shadow-[0_0_12px_rgba(234,88,12,0.4)]" :
                              "drop-shadow-[0_0_12px_rgba(244,114,182,0.4)]"
                            }
                            strokeLinejoin="round"
                          />
                        )}

                        {/* Draw Nodes */}
                        {PITCH_NODES.map((node) => {
                          const isSelected = selectedNodes.includes(node.index);
                          const isFirst = selectedNodes[0] === node.index;
                          return (
                            <g key={node.name} className="cursor-pointer transition-transform hover:scale-110" onClick={() => handleNodeClick(node.index)}>
                              <circle 
                                cx={node.x} cy={node.y} r="22" 
                                fill={isSelected ? (
                                  isFirst ? "#10b981" : 
                                  selectedNodes.length >= 7 ? "#ea580c" : 
                                  selectedNodes.length >= 5 ? "#db2777" : 
                                  selectedNodes.length === 4 ? "#8b5cf6" : 
                                  "#0ea5e9"
                                ) : "#1e293b"}
                                stroke={isSelected ? (
                                  isFirst ? "#6ee7b7" :
                                  selectedNodes.length >= 7 ? "#fed7aa" : 
                                  selectedNodes.length >= 5 ? "#fbcfe8" : 
                                  selectedNodes.length === 4 ? "#c4b5fd" : 
                                  "#bae6fd"
                                ) : "#475569"} 
                                strokeWidth={isFirst ? "4" : "3"}
                                className="transition-all duration-300"
                              />
                              <text 
                                x={node.x} y={node.y} 
                                textAnchor="middle" dy={showSigs ? "-0.1em" : ".3em"} 
                                fill={isSelected ? "#ffffff" : "#94a3b8"}
                                className={`font-bold select-none pointer-events-none transition-all ${node.name.length > 2 ? 'text-[11px]' : 'text-lg'}`}
                              >
                                {node.name}
                              </text>
                              {showSigs && (
                                <text 
                                  x={node.x} y={node.y} 
                                  textAnchor="middle" dy="1.4em" 
                                  fill={isSelected ? "#e2e8f0" : "#64748b"}

                            <span className="text-2xl font-bold text-white w-12 sm:w-16 text-center shrink-0">ii</span>
                            <div>
                              <strong className="text-indigo-300 block">Supertonic ("Above the Tonic")</strong>
                              <span className="text-sm">Minor. It acts as a bridge that strongly leads directly into the V (Dominant) chord.</span>
                            </div>
                          </div>
                          <button disabled={isPlaying} onClick={() => { setSelectedNodes([2]); playChord([2]); }} className="bg-slate-700 hover:bg-slate-600 disabled:opacity-50 text-indigo-300 px-4 py-2 rounded-lg text-xs font-bold transition-colors shrink-0 shadow-md self-start sm:self-center">▶ Play Tone (D)</button>
                        </div>

                        <div className="bg-slate-800 p-4 rounded-lg flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-l-4 border-blue-400">
                          <div className="flex items-center gap-4">
                            <span className="text-2xl font-bold text-white w-12 sm:w-16 text-center shrink-0">iii</span>
                            <div>
                              <strong className="text-blue-300 block">Mediant ("In the Middle")</strong>
                              <span className="text-sm">Minor. Halfway between the Tonic and Dominant. It shares 2 notes with the Tonic, making it sound stable but slightly floaty.</span>
                            </div>
                          </div>
                          <button disabled={isPlaying} onClick={() => { setSelectedNodes([4]); playChord([4]); }} className="bg-slate-700 hover:bg-slate-600 disabled:opacity-50 text-blue-300 px-4 py-2 rounded-lg text-xs font-bold transition-colors shrink-0 shadow-md self-start sm:self-center">▶ Play Tone (E)</button>
                        </div>

                        <div className="bg-slate-800 p-4 rounded-lg flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-l-4 border-emerald-400">
                          <div className="flex items-center gap-4">
                            <span className="text-2xl font-bold text-white w-12 sm:w-16 text-center shrink-0">IV</span>
                            <div>
                              <strong className="text-emerald-300 block">Subdominant ("Below Dominant")</strong>
                              <span className="text-sm">Major. The "away" chord. It wants to wander off or step up to the V chord. Used heavily in Gospel and Rock.</span>
                            </div>
                          </div>
                          <button disabled={isPlaying} onClick={() => { setSelectedNodes([11]); playChord([11]); }} className="bg-slate-700 hover:bg-slate-600 disabled:opacity-50 text-emerald-300 px-4 py-2 rounded-lg text-xs font-bold transition-colors shrink-0 shadow-md self-start sm:self-center">▶ Play Tone (F)</button>
                        </div>

                        <div className="bg-slate-800 p-4 rounded-lg flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-l-4 border-emerald-600">
                          <div className="flex items-center gap-4">
                            <span className="text-2xl font-bold text-white w-12 sm:w-16 text-center shrink-0">V</span>
                            <div>
                              <strong className="text-emerald-400 block">Dominant (The Engine)</strong>
                              <span className="text-sm">Major. Contains the "leading tone" of the scale. It creates massive tension that strongly wants to "pull" back home to the I chord.</span>
                            </div>
                          </div>

                          <div className="flex items-center gap-4">
                            <span className="text-2xl font-bold text-white w-12 sm:w-16 text-center shrink-0">vi</span>
                            <div>
                              <strong className="text-slate-300 block">Submediant (Relative Minor)</strong>
                              <span className="text-sm">Minor. The minor equivalent of the Home Base. Often used for "Deceptive Cadences" (going V &rarr; vi instead of V &rarr; I to surprise the listener).</span>
                            </div>
                          </div>

                            <span className="text-2xl font-bold text-white w-12 sm:w-16 text-center shrink-0">vii&deg;</span>
                            <div>
                              <strong className="text-rose-300 block">Leading Tone (or Subtonic in minor)</strong>
                              <span className="text-sm">Diminished. Extremely unstable. It is basically a V7 chord without the root note. It desperately wants to collapse upward to the Tonic. <em>(Note: In a minor key, the 7th chord is called the Subtonic and is Major: bVII).</em></span>
                            </div>
                          </div>
                          <button disabled={isPlaying} onClick={() => { setSelectedNodes([5]); playChord([5]); }} className="bg-slate-700 hover:bg-slate-600 disabled:opacity-50 text-rose-300 px-4 py-2 rounded-lg text-xs font-bold transition-colors shrink-0 shadow-md self-start sm:self-center">▶ Play Tone (B)</button>
                        </div>
                      </div>
                    </section>

                  </div>
                </div>
              )}

              {/* TAB CONTENT: MODES & SCALES */}
              {activeTab === 'modes' && (
                <div className="w-full max-w-4xl bg-slate-900 rounded-2xl p-6 md:p-10 border border-slate-800 shadow-xl leading-relaxed text-slate-300 mx-auto">
                  <h2 className="text-3xl font-bold text-sky-400 mb-2">Modes & Diatonic Harmony</h2>
                  <p className="text-slate-400 mb-8 border-b border-slate-700 pb-4">Unlocking the secrets of the Major Scale and its 7 alter-egos.</p>
                  
                  <div className="space-y-10">
                    
                    {/* The Diatonic Math */}
                    <section>
                      <h3 className="text-2xl font-semibold text-white mb-4">Why are some chords Major and some Minor?</h3>
                      <p className="mb-4">It all comes down to musical math and the rules of the key signature. Let's look at <strong>C Major (C, D, E, F, G, A, B)</strong>. There are no sharps and no flats.</p>
                      <p className="mb-4">To build a chord, we stack every other note (Root, 3rd, 5th). We MUST use only the notes in the C Major scale. Let's see what happens naturally:</p>

                      <div className="bg-slate-950 p-5 rounded-xl border border-slate-700 space-y-4">
                        <div>
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-sky-300">The 1st Chord (C):</strong>
                            <button disabled={isPlaying} onClick={() => { setSelectedNodes([0, 4, 1]); playChord([0, 4, 1]); }} className="bg-slate-800 hover:bg-slate-700 text-sky-300 px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2 border border-slate-700">▶ Play I Chord</button>
                          </div>
                          Stack C &rarr; E &rarr; G. <br/>
                          The distance from C to E is a <em>Major 3rd</em> (4 half-steps). Therefore, the I chord is naturally <strong>Major</strong>.
                        </div>
                        <div className="border-t border-slate-800 pt-4">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-indigo-300">The 2nd Chord (D):</strong>
                            <button disabled={isPlaying} onClick={() => { setSelectedNodes([2, 11, 3]); playChord([2, 11, 3]); }} className="bg-slate-800 hover:bg-slate-700 text-indigo-300 px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2 border border-slate-700">▶ Play ii Chord</button>
                          </div>
                          Because we can't use F# (it's not in C Major), we must use F natural. The distance from D to F is only a <em>minor 3rd</em> (3 half-steps). Therefore, the ii chord is naturally <strong>Minor</strong>.
                        </div>
                        <div className="border-t border-slate-800 pt-4">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-blue-300">The 3rd Chord (E):</strong>
                            <button disabled={isPlaying} onClick={() => { setSelectedNodes([4, 1, 5]); playChord([4, 1, 5]); }} className="bg-slate-800 hover:bg-slate-700 text-blue-300 px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2 border border-slate-700">▶ Play iii Chord</button>
                          </div>
                          Again, E to G is a minor 3rd. The iii chord is <strong>Minor</strong>.
                        </div>
                        <div className="border-t border-slate-800 pt-4">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-emerald-300">The 4th Chord (F):</strong>
                            <button disabled={isPlaying} onClick={() => { setSelectedNodes([11, 3, 0]); playChord([11, 3, 0]); }} className="bg-slate-800 hover:bg-slate-700 text-emerald-300 px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2 border border-slate-700">▶ Play IV Chord</button>
                          </div>
                          F to A is a Major 3rd. The IV chord is <strong>Major</strong>.
                        </div>
                        <div className="border-t border-slate-800 pt-4">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-emerald-500">The 5th Chord (G):</strong>
                            <button disabled={isPlaying} onClick={() => { setSelectedNodes([1, 5, 2]); playChord([1, 5, 2]); }} className="bg-slate-800 hover:bg-slate-700 text-emerald-500 px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2 border border-slate-700">▶ Play V Chord</button>
                          </div>
                          G to B is a Major 3rd. The V chord is <strong>Major</strong>.
                        </div>
                        <div className="border-t border-slate-800 pt-4">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-slate-400">The 6th Chord (A):</strong>
                            <button disabled={isPlaying} onClick={() => { setSelectedNodes([3, 0, 4]); playChord([3, 0, 4]); }} className="bg-slate-800 hover:bg-slate-700 text-slate-400 px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2 border border-slate-700">▶ Play vi Chord</button>
                          </div>
                          A to C is a minor 3rd. The vi chord is <strong>Minor</strong>.
                        </div>
                        <div className="border-t border-slate-800 pt-4">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-rose-300">The 7th Chord (B):</strong>
                            <button disabled={isPlaying} onClick={() => { setSelectedNodes([5, 2, 11]); playChord([5, 2, 11]); }} className="bg-slate-800 hover:bg-slate-700 text-rose-300 px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2 border border-slate-700">▶ Play vii&deg; Chord</button>
                          </div>
                          B to D is a minor 3rd. D to F is ALSO a minor 3rd. Two minor 3rds stacked creates a <strong>Diminished</strong> chord!
                        </div>
                      </div>
                      <p className="mt-4 text-sm text-sky-400 text-center font-bold">This natural pattern applies to EVERY major key: I (Maj), ii (min), iii (min), IV (Maj), V (Maj), vi (min), vii&deg; (Dim).</p>
                    </section>

                    {/* The 7 Modes */}
                    <section className="bg-sky-900/10 p-6 rounded-xl border border-sky-500/20">
                      <h3 className="text-2xl font-semibold text-white mb-4">What are Modes?</h3>
                      <p className="mb-4">Modes are just the Major Scale, but starting on a different note. If you play the white keys on a piano from C to C, you get a happy Major scale. But if you play the exact same white keys starting from D to D, the "Root" has changed. You are now playing a completely different mood called a Mode.</p>
                      
                      <div className="space-y-4">
                        <div className="bg-slate-800/80 p-4 rounded-lg">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-xl text-white">1. Ionian (The Major Scale)</strong>
                            <button disabled={isPlaying} onClick={() => playModeScale(261.63, [0, 2, 4, 5, 7, 9, 11, 12])} className="bg-slate-700 hover:bg-slate-600 disabled:opacity-50 text-white px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2">▶ Play Scale</button>
                          </div>
                          <p className="text-sky-300 text-sm mb-1">Scale: C - D - E - F - G - A - B - C</p>
                          <p className="text-sm">Bright, happy, resolved. The standard against which all other modes are measured.</p>
                        </div>

                        <div className="bg-slate-800/80 p-4 rounded-lg border-l-4 border-indigo-500">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-xl text-white">2. Dorian</strong>
                            <button disabled={isPlaying} onClick={() => playModeScale(293.66, [0, 2, 3, 5, 7, 9, 10, 12])} className="bg-indigo-700 hover:bg-indigo-600 disabled:opacity-50 text-white px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2">▶ Play Scale</button>
                          </div>
                          <p className="text-indigo-300 text-sm mb-1">Scale: D - E - F - G - A - B - C - D <span className="text-slate-400">(Formula: Minor scale with a raised 6th)</span></p>
                          <p className="text-sm">Smooth, cool, and jazzy. It sounds minor, but the raised 6th gives it a hopeful, floating quality. (Think: Carlos Santana).</p>
                        </div>

                        <div className="bg-slate-800/80 p-4 rounded-lg border-l-4 border-orange-500">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-xl text-white">3. Phrygian</strong>
                            <button disabled={isPlaying} onClick={() => playModeScale(329.63, [0, 1, 3, 5, 7, 8, 10, 12])} className="bg-orange-700 hover:bg-orange-600 disabled:opacity-50 text-white px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2">▶ Play Scale</button>
                          </div>
                          <p className="text-orange-300 text-sm mb-1">Scale: E - F - G - A - B - C - D - E <span className="text-slate-400">(Formula: Minor scale with a flattened 2nd)</span></p>
                          <p className="text-sm">Dark, exotic, and Spanish. That half-step jump right at the beginning (E to F) gives it a very distinct Flamenco or Metal sound.</p>
                        </div>

                        <div className="bg-slate-800/80 p-4 rounded-lg border-l-4 border-pink-500">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-xl text-white">4. Lydian</strong>
                            <button disabled={isPlaying} onClick={() => playModeScale(349.23, [0, 2, 4, 6, 7, 9, 11, 12])} className="bg-pink-700 hover:bg-pink-600 disabled:opacity-50 text-white px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2">▶ Play Scale</button>
                          </div>
                          <p className="text-pink-300 text-sm mb-1">Scale: F - G - A - B - C - D - E - F <span className="text-slate-400">(Formula: Major scale with a raised 4th)</span></p>
                          <p className="text-sm">Dreamy, magical, and cinematic. The raised 4th (F to B creates a tritone!) gives it an unresolved, floating-in-space feeling.</p>
                        </div>

                        <div className="bg-slate-800/80 p-4 rounded-lg border-l-4 border-yellow-500">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-xl text-white">5. Mixolydian</strong>
                            <button disabled={isPlaying} onClick={() => playModeScale(392.00, [0, 2, 4, 5, 7, 9, 10, 12])} className="bg-yellow-700 hover:bg-yellow-600 disabled:opacity-50 text-white px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2">▶ Play Scale</button>
                          </div>
                          <p className="text-yellow-300 text-sm mb-1">Scale: G - A - B - C - D - E - F - G <span className="text-slate-400">(Formula: Major scale with a flattened 7th)</span></p>
                          <p className="text-sm">Bluesy, classic rock. It has the brightness of a major scale, but the flat 7 makes it sound rebellious and ready to groove.</p>
                        </div>

                        <div className="bg-slate-800/80 p-4 rounded-lg border-l-4 border-slate-500">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-xl text-white">6. Aeolian (The Natural Minor Scale)</strong>
                            <button disabled={isPlaying} onClick={() => playModeScale(440.00, [0, 2, 3, 5, 7, 8, 10, 12])} className="bg-slate-600 hover:bg-slate-500 disabled:opacity-50 text-white px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2">▶ Play Scale</button>
                          </div>
                          <p className="text-slate-300 text-sm mb-1">Scale: A - B - C - D - E - F - G - A</p>
                          <p className="text-sm">Sad, emotional, epic. This is the standard minor scale used in almost all sad pop songs and epic movie scores.</p>
                        </div>

                        <div className="bg-slate-800/80 p-4 rounded-lg border-l-4 border-red-600">
                          <div className="flex justify-between items-start md:items-center mb-1">
                            <strong className="text-xl text-white">7. Locrian</strong>
                            <button disabled={isPlaying} onClick={() => playModeScale(493.88, [0, 1, 3, 5, 6, 8, 10, 12])} className="bg-red-700 hover:bg-red-600 disabled:opacity-50 text-white px-3 py-1 rounded text-xs font-bold transition-colors shrink-0 ml-2">▶ Play Scale</button>
                          </div>
                          <p className="text-red-400 text-sm mb-1">Scale: B - C - D - E - F - G - A - B <span className="text-slate-400">(Formula: Minor scale with a flat 2 and flat 5)</span></p>
                          <p className="text-sm">Theoretical and highly unstable. It's the only mode built on a diminished chord, meaning it has no stable "home" base. Rarely used in full songs.</p>
                        </div>
                      </div>
                    </section>

                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
